name: Daily GitHub Hot AI Digest

on:
  schedule:
    # 08:30 Asia/Shanghai = 00:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate HTML report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          DASHSCOPE_BASE_URL: ${{ secrets.DASHSCOPE_BASE_URL }}
          DASHSCOPE_GENERATION_URL: ${{ secrets.DASHSCOPE_GENERATION_URL }}
          DASHSCOPE_MODEL: ${{ vars.DASHSCOPE_MODEL || 'qwen3.6-max-preview' }}
          DASHSCOPE_FALLBACK_MODELS: ${{ vars.DASHSCOPE_FALLBACK_MODELS }}
          DASHSCOPE_ENABLE_THINKING: ${{ vars.DASHSCOPE_ENABLE_THINKING || 'false' }}
          DASHSCOPE_TIMEOUT_SECONDS: ${{ vars.DASHSCOPE_TIMEOUT_SECONDS || '600' }}
          REPORT_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: python scripts/daily_hot_repos.py --no-send

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-${{ github.run_id }}
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}

      - name: Send Feishu link
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          REPORT_BASE_URL: ${{ steps.deployment.outputs.page_url }}
        run: python scripts/daily_hot_repos.py --send-link-only
